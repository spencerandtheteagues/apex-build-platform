services:
  - type: web
    name: apex-build-investor-demo
    runtime: static
    rootDir: investor-demo
    buildCommand: sh ./build-static-site.sh
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer-when-downgrade
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
