# APEX.BUILD Render Blueprint
# Deploy infrastructure as code on Render
# https://render.com/docs/blueprint-spec

services:
  # ============================================
  # Backend API Service
  # ============================================
  - type: web
    name: apex-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://apex-build.dev
      - key: BASE_URL
        value: https://apex-build.dev
      - key: CORS_ALLOWED_ORIGINS
        value: https://apex-build.dev,https://www.apex-build.dev,https://apex.build,https://www.apex.build,https://apex-frontend-gigq.onrender.com
      - key: COOKIE_SAME_SITE
        value: None
      - key: COOKIE_SECURE
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: apex-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false  # Set once in Render dashboard; do not rotate automatically on deploy
      - key: JWT_REFRESH_SECRET
        sync: false  # Separate long-lived refresh secret; set manually and keep stable
      - key: SECRETS_MASTER_KEY
        sync: false  # Required for decrypting stored secrets; set manually and keep stable
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: SPENCER_SEED_PASSWORD
        sync: false
      - key: EXECUTION_FORCE_CONTAINER
        value: "true"  # Production requires container isolation; execution degrades safely if Docker is unavailable
      - key: APEX_ENABLE_HOST_TERMINAL
        value: "false"
      - key: DB_MAX_OPEN_CONNS
        value: "20"  # Safe for Render Starter PostgreSQL (25 conn limit); raise to 90 on Standard plan
      - key: BUILD_MAX_REQUESTS
        value: "80"
      - key: BUILD_MAX_REQUESTS_FAST
        value: "80"
      - key: BUILD_MAX_REQUESTS_FULL
        value: "150"
      - key: BUILD_TIMEOUT_FAST_SECONDS
        value: "1200"
      - key: BUILD_TIMEOUT_FULL_SECONDS
        value: "3600"
      - key: BUILD_STALL_TIMEOUT_FAST_SECONDS
        value: "600"
      - key: BUILD_STALL_TIMEOUT_FULL_SECONDS
        value: "1200"
      - key: APEX_PREVIEW_RUNTIME_VERIFY
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_API_KEY
        sync: false  # Ollama Cloud / OpenAI-compatible proxy API key (e.g. Together AI, Fireworks)
      - key: OLLAMA_BASE_URL
        sync: false  # Optional: override default Ollama Cloud URL (default: https://ollama.com/v1)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BUILDER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_BUILDER_ANNUAL
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: STRIPE_PRICE_TEAM_MONTHLY
        sync: false
      - key: STRIPE_PRICE_TEAM_ANNUAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_ANNUAL
        sync: false
      - key: STRIPE_PRICE_CREDITS_10
        sync: false  # $10 → 1,000 credits top-up price ID
      - key: STRIPE_PRICE_CREDITS_25
        sync: false  # $25 → 2,500 credits top-up price ID
      - key: STRIPE_PRICE_CREDITS_50
        sync: false  # $50 → 5,000 credits top-up price ID
      - key: STRIPE_PRICE_CREDITS_100
        sync: false  # $100 → 10,000 credits top-up price ID
      - key: E2B_API_KEY
        sync: false  # Set in Render dashboard after signing up at e2b.dev
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: apex-build-assets
      - key: R2_ENDPOINT
        sync: false
    autoDeploy: true

  # ============================================
  # Frontend Static Site
  # ============================================
  - type: web
    name: apex-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: VITE_API_URL
        value: https://api.apex-build.dev/api/v1
      - key: VITE_WS_URL
        value: wss://api.apex-build.dev/ws
      - key: NODE_ENV
        value: production
      - key: APEX_ENABLE_CROSS_ORIGIN_ISOLATION
        value: "false"  # Keep disabled until every frontend asset/iframe path is COEP-compatible.
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  # ============================================
  # Managed Key Value Cache
  # ============================================
  - type: keyvalue
    name: apex-redis
    region: oregon
    ipAllowList: []  # Internal-only; backend receives the private connection string via REDIS_URL

  # ============================================
  # Background Worker (optional)
  # ============================================
  # - type: worker
  #   name: apex-worker
  #   runtime: docker
  #   dockerfilePath: ./backend/Dockerfile.worker
  #   dockerContext: ./backend
  #   region: oregon
  #   plan: starter
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: apex-db
  #         property: connectionString

databases:
  # ============================================
  # PostgreSQL Database
  # ============================================
  - name: apex-db
    plan: starter
    region: oregon
    postgresMajorVersion: 15
    # databaseName: apex_build
    # user: apex_user

# Preview Environments (for PRs)
previewsEnabled: false
previewsExpireAfterDays: 7
