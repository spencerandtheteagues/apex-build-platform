# APEX.BUILD CI Pipeline
# Runs on every pull request and push to main
# Includes: lint, test, build, security scanning, E2E tests
#
# Hosted GitHub Actions jobs are opt-in for this repo. Leave the repository
# variable APEX_ENABLE_GITHUB_ACTIONS unset unless the account can run hosted
# runners; local validation remains the default launch gate for free accounts.

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Backend CI Jobs
  # ============================================

  backend-lint:
    name: Backend Lint
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

  backend-test:
    name: Backend Tests
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: apex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/apex_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          ENVIRONMENT: test
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: false

  backend-build:
    name: Backend Build
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build binary
        working-directory: backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X main.Version=${{ github.sha }}" \
            -o apex-server ./cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/apex-server
          retention-days: 7

  # ============================================
  # Frontend CI Jobs
  # ============================================

  frontend-lint:
    name: Frontend Lint
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/e2e/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint -- --max-warnings 0

      - name: Run TypeScript check
        working-directory: frontend
        run: npm run typecheck

  frontend-test:
    name: Frontend Tests
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: https://api.apex-build.dev/api/v1
          VITE_WS_URL: wss://api.apex-build.dev/ws
          NODE_ENV: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ============================================
  # Security Scanning
  # ============================================

  security-trivy:
    name: Trivy Security Scan
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  security-dependency-check:
    name: Dependency Security Check
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Go vulnerability check
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ============================================
  # Docker Image Build
  # ============================================

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (tags, labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=https://api.apex-build.dev/api/v1
            VITE_WS_URL=wss://api.apex-build.dev/ws
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # E2E Tests
  # ============================================

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: apex_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/apex_e2e?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          ENVIRONMENT: test
          PORT: 8080
        run: |
          chmod +x apex-server
          ./apex-server &
          sleep 5

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_API_URL: http://127.0.0.1:8080
        run: |
          (cd frontend && npm run preview -- --host 127.0.0.1 --port 5173 > /tmp/apex-frontend-e2e.log 2>&1 &)
          FRONTEND_READY=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null; then
              FRONTEND_READY=1
              break
            fi
            sleep 2
          done
          if [ "$FRONTEND_READY" -ne 1 ]; then
            echo "Frontend preview failed to start"
            cat /tmp/apex-frontend-e2e.log || true
            exit 1
          fi
          cd tests/e2e
          npm run generate
          npx playwright test --project=chromium

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
            /tmp/apex-frontend-e2e.log
          retention-days: 7

  # ============================================
  # CI Summary
  # ============================================

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, security-trivy, security-dependency-check, docker-build]
    if: ${{ always() && vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.backend-build.result }}" == "success" ] && \
             [ "${{ needs.frontend-build.result }}" == "success" ] && \
             [ "${{ needs.docker-build.result }}" == "success" ]; then
            echo "CI Pipeline completed successfully!"
            exit 0
          else
            echo "CI Pipeline failed"
            echo "Backend build: ${{ needs.backend-build.result }}"
            echo "Frontend build: ${{ needs.frontend-build.result }}"
            echo "Docker build: ${{ needs.docker-build.result }}"
            exit 1
          fi
