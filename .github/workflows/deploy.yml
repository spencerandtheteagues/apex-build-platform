name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Render auto-deploys from the main branch via render.yaml.
  # This job waits for the backend to become healthy after Render deploys,
  # then runs smoke tests to verify the production environment.

  verify-deployment:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for backend to become healthy
        run: |
          echo "Waiting for backend health check at api.apex-build.dev ..."
          MAX_ATTEMPTS=45
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HEALTH_JSON=$(curl -fsS https://api.apex-build.dev/ready 2>/dev/null || true)
            STATUS=$(printf '%s' "$HEALTH_JSON" | jq -r '.status // "unavailable"' 2>/dev/null || echo "unavailable")
            READY=$(printf '%s' "$HEALTH_JSON" | jq -r '.ready // "false"' 2>/dev/null || echo "false")

            if [ "$STATUS" = "healthy" ] && [ "$READY" = "true" ]; then
              echo "Backend is healthy!"
              echo "$HEALTH_JSON"
              exit 0
            fi

            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: not ready (status=$STATUS ready=$READY)"
            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done

          echo "ERROR: Backend did not become healthy after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Run production smoke tests
        run: |
          echo "=== Production smoke tests ==="

          # Backend health
          echo "Backend health:"
          BACKEND_HEALTH=$(curl -fsS https://api.apex-build.dev/ready)
          echo "$BACKEND_HEALTH"
          printf '%s' "$BACKEND_HEALTH" | jq -e '.status == "healthy"' >/dev/null || { echo "Backend health check failed"; exit 1; }

          # Frontend serving
          echo "Frontend status:"
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://apex-build.dev)
          echo "HTTP $FRONTEND_STATUS"
          [ "$FRONTEND_STATUS" = "200" ] || { echo "Frontend returned $FRONTEND_STATUS"; exit 1; }

          echo "All smoke tests passed."

      - name: Create deployment summary
        if: always()
        run: |
          echo "## Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: https://api.apex-build.dev" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://apex-build.dev" >> $GITHUB_STEP_SUMMARY

  trigger-render-deploy:
    name: Trigger Render Backend Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
      RENDER_FRONTEND_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
    steps:
      - name: Trigger Render deploy (if secrets configured)
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_BACKEND_SERVICE_ID" ]; then
            echo "Triggering Render backend deploy..."
            curl -s -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}' \
              "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys" | jq .
          else
            echo "Render secrets not configured - skipping API trigger (Render autodeploys from main branch)"
          fi

          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_FRONTEND_SERVICE_ID" ]; then
            echo "Triggering Render frontend deploy..."
            curl -s -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}' \
              "https://api.render.com/v1/services/$RENDER_FRONTEND_SERVICE_ID/deploys" | jq .
          fi
