name: Production Canary

# Production canaries use hosted runners and can spend live product/provider
# resources. Keep them opt-in with APEX_ENABLE_GITHUB_ACTIONS=true.

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      run_prompt_matrix:
        description: Run the 20-prompt paid full-mode live reliability matrix
        required: false
        default: false
        type: boolean
      run_checkout_probes:
        description: Create non-paid Stripe checkout sessions in the launch verifier
        required: false
        default: false
        type: boolean
      run_portal_probe:
        description: Create a Stripe billing portal session for the configured canary customer
        required: false
        default: false
        type: boolean
      run_mobile_external_strict:
        description: Require strict mobile native/store evidence for a configured canary project
        required: false
        default: false
        type: boolean
      prompt_matrix_power_modes:
        description: Space-separated power modes for the prompt matrix
        required: false
        default: balanced
        type: string

concurrency:
  group: production-canary
  cancel-in-progress: false

jobs:
  canary-script-guardrails:
    name: Canary Script Guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run canary report unit tests
        run: bash scripts/test/canary_report_test.sh

      - name: Run canary matrix false-green tests
        run: bash scripts/test/canary_matrix_guardrail_test.sh

  public-launch-smoke:
    name: Public Launch Smoke
    needs: canary-script-guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install launch smoke deps
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run public production launch smoke
        working-directory: tests/e2e
        env:
          PLAYWRIGHT_BASE_URL: https://apex-build.dev
          PLAYWRIGHT_API_URL: https://api.apex-build.dev
          PLAYWRIGHT_EXPECT_LIVE_STRIPE: '1'
          PLAYWRIGHT_EXPECT_LAUNCH_READY: '1'
        run: npm run test:launch -- --project=chromium

  launch-verifier-suite:
    name: Launch Verification Scripts
    needs: canary-script-guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stripe launch verifier
        env:
          APEX_API_URL: https://api.apex-build.dev
          APEX_FRONTEND_URL: https://apex-build.dev
          APEX_STRIPE_EXPECT_LIVE: '1'
          APEX_STRIPE_REGISTER_SMOKE_USER: '1'
          APEX_STRIPE_USERNAME: ${{ secrets.APEX_CANARY_USERNAME }}
          APEX_STRIPE_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          APEX_STRIPE_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
          RUN_CHECKOUT_PROBES: ${{ github.event_name == 'workflow_dispatch' && inputs.run_checkout_probes == true && 'true' || 'false' }}
          RUN_PORTAL_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_portal_probe == true && 'true' || 'false' }}
        run: |
          if [[ "$RUN_CHECKOUT_PROBES" == "true" ]]; then
            export APEX_STRIPE_RUN_CHECKOUT=1
            export APEX_STRIPE_RUN_CREDIT_CHECKOUT=1
            export APEX_STRIPE_CHECKOUT_PLAN=builder
            export APEX_STRIPE_CHECKOUT_CYCLE=monthly
            export APEX_STRIPE_CREDIT_AMOUNT=25
          fi

          if [[ "$RUN_PORTAL_PROBE" == "true" ]]; then
            if [[ -z "$APEX_STRIPE_PASSWORD" || ( -z "$APEX_STRIPE_USERNAME" && -z "$APEX_STRIPE_EMAIL" ) ]]; then
              echo "::error::APEX_CANARY_USERNAME or APEX_CANARY_EMAIL plus APEX_CANARY_PASSWORD are required when run_portal_probe is true."
              exit 1
            fi
            export APEX_STRIPE_REGISTER_SMOKE_USER=0
            export APEX_STRIPE_RUN_PORTAL=1
          fi

          node scripts/verify_stripe_launch.mjs

      - name: Run Render launch verifier
        env:
          APEX_API_URL: https://api.apex-build.dev
          APEX_RENDER_CHECK_LIVE: '1'
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          RENDER_FRONTEND_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          node scripts/verify_render_launch_env.mjs

          if [[ -n "$RENDER_API_KEY" && -n "$RENDER_BACKEND_SERVICE_ID" && -n "$RENDER_FRONTEND_SERVICE_ID" ]]; then
            APEX_RENDER_EXPECT_PRODUCTION=1 node scripts/verify_render_launch_env.mjs
          else
            echo "::warning::Skipping strict Render launch env verification because Render secrets are not configured."
          fi

      - name: Run mobile external-readiness verifier
        env:
          APEX_API_URL: https://api.apex-build.dev
          APEX_MOBILE_CHECK_LIVE: '1'
          APEX_AUTH_TOKEN: ${{ secrets.APEX_MOBILE_CANARY_TOKEN }}
          APEX_MOBILE_PROJECT_ID: ${{ secrets.APEX_MOBILE_CANARY_PROJECT_ID }}
          RUN_MOBILE_EXTERNAL_STRICT: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mobile_external_strict == true && 'true' || 'false' }}
        run: |
          node scripts/verify_mobile_external_readiness.mjs

          if [[ "$RUN_MOBILE_EXTERNAL_STRICT" == "true" ]]; then
            missing=0
            if [[ -z "$APEX_AUTH_TOKEN" ]]; then
              echo "::error::APEX_MOBILE_CANARY_TOKEN is required when run_mobile_external_strict is true."
              missing=1
            fi
            if [[ -z "$APEX_MOBILE_PROJECT_ID" ]]; then
              echo "::error::APEX_MOBILE_CANARY_PROJECT_ID is required when run_mobile_external_strict is true."
              missing=1
            fi
            if [[ "$missing" -ne 0 ]]; then
              exit 1
            fi

            APEX_MOBILE_EXPECT_NATIVE_READY=1 node scripts/verify_mobile_external_readiness.mjs
          fi

  preview-verification-canary:
    name: Preview Verification Canary
    needs: canary-script-guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E deps
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run preview verification canary
        working-directory: tests/e2e
        env:
          PLAYWRIGHT_BASE_URL: https://apex-build.dev
          PLAYWRIGHT_API_URL: https://api.apex-build.dev
        run: npm run test:preview-verify -- --project=chromium

  platform-build-canary-matrix:
    name: Platform Build Canary (${{ matrix.name }})
    needs: canary-script-guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: free-fast
            mode: fast
            power_mode: fast
            smoke_profile: free_frontend
            poll_seconds: 10
            max_polls: 120
            requires_paid: false
          - name: paid-balanced
            mode: full
            power_mode: balanced
            smoke_profile: paid_fullstack
            poll_seconds: 15
            max_polls: 160
            requires_paid: true
          - name: paid-max
            mode: full
            power_mode: max
            smoke_profile: paid_fullstack
            poll_seconds: 15
            max_polls: 180
            requires_paid: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check paid canary credentials
        id: paid-creds
        env:
          APEX_CANARY_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          APEX_CANARY_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
        run: |
          if [[ -n "$APEX_CANARY_EMAIL" && -n "$APEX_CANARY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [[ "${{ matrix.requires_paid }}" == "true" ]]; then
              echo "Skipping paid platform canary because APEX_CANARY_EMAIL/APEX_CANARY_PASSWORD are not configured."
            fi
          fi

      - name: Run platform build canary
        id: run-canary
        if: ${{ !matrix.requires_paid || steps.paid-creds.outputs.available == 'true' }}
        env:
          BASE_URL: https://api.apex-build.dev/api/v1
          MODE: ${{ matrix.mode }}
          POWER_MODE: ${{ matrix.power_mode }}
          SMOKE_PROFILE: ${{ matrix.smoke_profile }}
          EXPECT_STATUS: completed
          # Paid full-stack scenarios must prove a real, reachable preview (active + url),
          # not just a "completed" status — guards against preview false greens.
          ASSERT_PREVIEW_READY: ${{ matrix.requires_paid && '1' || '0' }}
          ARTIFACT_DIR: ${{ github.workspace }}/canary-artifacts/${{ matrix.name }}
          LOGIN_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          LOGIN_USERNAME: ${{ secrets.APEX_CANARY_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
          LOGIN_FULL_NAME: APEX Canary
          POLL_SECONDS: ${{ matrix.poll_seconds }}
          MAX_POLLS: ${{ matrix.max_polls }}
          PROJECT_NAME: canary-${{ matrix.name }}
        run: ./scripts/run_platform_build_smoke.sh

      - name: Record canary status marker
        if: always()
        env:
          OUTCOME: ${{ steps.run-canary.outcome }}
          NAME: ${{ matrix.name }}
          REQUIRES_PAID: ${{ matrix.requires_paid }}
        run: |
          dir="${{ github.workspace }}/canary-artifacts/${NAME}"
          mkdir -p "$dir"
          case "$OUTCOME" in
            success) status=PASSED ;;
            skipped) status=SKIPPED_NO_CREDS ;;
            *)       status=FAILED ;;
          esac
          echo "$status" > "$dir/STATUS"
          {
            echo "scenario=${NAME}"
            echo "requires_paid=${REQUIRES_PAID}"
            echo "outcome=${OUTCOME}"
          } > "$dir/META"
          echo "Recorded ${NAME}: status=${status} (step outcome=${OUTCOME})"

      - name: Upload platform canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-canary-${{ matrix.name }}
          path: ${{ github.workspace }}/canary-artifacts/${{ matrix.name }}
          retention-days: 14
          if-no-files-found: warn

  platform-canary-gate:
    name: Platform Canary Gate (false-green guard)
    needs: platform-build-canary-matrix
    if: ${{ always() && vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download platform canary artifacts
        uses: actions/download-artifact@v4
        # Each artifact lands in its own subdir (canary-artifacts/platform-canary-<name>/),
        # which the gate loop below iterates. Do NOT add merge-multiple: true — it collapses
        # files into one dir and STATUS/META from different scenarios would collide.
        with:
          pattern: platform-canary-*
          path: canary-artifacts

      - name: Enforce required canaries actually ran and passed
        env:
          # Opt-in hard gate: when true, a required paid canary that was skipped or
          # failed fails this job (prevents a green run hiding skipped paid canaries).
          # Defaults to warn-only so the pipeline isn't broken before creds are wired.
          REQUIRE_PAID: ${{ vars.APEX_REQUIRE_PAID_CANARIES }}
        run: |
          shopt -s nullglob
          fail=0
          found=0
          for dir in canary-artifacts/*/; do
            found=$((found + 1))
            status="$(cat "$dir/STATUS" 2>/dev/null || echo MISSING)"
            requires_paid="$(sed -n 's/^requires_paid=//p' "$dir/META" 2>/dev/null || echo unknown)"
            scenario="$(sed -n 's/^scenario=//p' "$dir/META" 2>/dev/null || basename "$dir")"
            echo "scenario=${scenario} requires_paid=${requires_paid} status=${status}"
            if [[ "$status" == "FAILED" ]]; then
              echo "::error::canary ${scenario} FAILED"
              fail=1
            fi
            if [[ "$requires_paid" == "true" && "$status" != "PASSED" ]]; then
              if [[ "$REQUIRE_PAID" == "true" ]]; then
                echo "::error::required paid canary ${scenario} did not pass (status=${status})"
                fail=1
              else
                echo "::warning::paid canary ${scenario} is not green (status=${status}); set repo variable APEX_REQUIRE_PAID_CANARIES=true to hard-gate launch."
              fi
            fi
          done
          if [[ "$found" -eq 0 ]]; then
            echo "::error::no platform canary artifacts found; the canary matrix did not produce results."
            exit 1
          fi
          if [[ "$fail" -ne 0 ]]; then
            echo "PLATFORM_CANARY_GATE_FAILED"
            exit 1
          fi
          echo "PLATFORM_CANARY_GATE_OK"

  golden-fieldops-live-canary:
    name: Golden FieldOps Live Canary
    needs: canary-script-guardrails
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check canary credentials
        id: canary-creds
        env:
          APEX_CANARY_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          APEX_CANARY_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
        run: |
          if [[ -n "$APEX_CANARY_EMAIL" && -n "$APEX_CANARY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping golden live canary because APEX_CANARY_EMAIL/APEX_CANARY_PASSWORD are not configured."
          fi

      - name: Set up Node
        if: steps.canary-creds.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E deps
        if: steps.canary-creds.outputs.available == 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.canary-creds.outputs.available == 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run balanced and max golden canary
        if: steps.canary-creds.outputs.available == 'true'
        env:
          BASE_URL: https://api.apex-build.dev/api/v1
          PROMPT_FILE: prompts/golden/apex-fieldops-ai.md
          POWER_MODES: balanced max
          MODE: full
          POLL_SECONDS: 15
          MAX_POLLS: 260
          PREVIEW_STABILITY_SECONDS: 15
          PREVIEW_STABILITY_POLL_MS: 1000
          PROJECT_NAME_PREFIX: golden-fieldops-live-canary
          ARTIFACT_ROOT: golden-canary-artifacts
          LOGIN_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          LOGIN_USERNAME: ${{ secrets.APEX_CANARY_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
        run: ./scripts/run_live_golden_canary_matrix.sh

      - name: Upload golden canary artifacts
        if: always() && steps.canary-creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: golden-fieldops-live-canary-artifacts
          path: golden-canary-artifacts
          retention-days: 14

  prompt-reliability-live-matrix:
    name: Prompt Reliability Live Matrix
    if: ${{ vars.APEX_ENABLE_GITHUB_ACTIONS == 'true' && github.event_name == 'workflow_dispatch' && inputs.run_prompt_matrix == true }}
    needs: canary-script-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check canary credentials
        id: canary-creds
        env:
          APEX_CANARY_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          APEX_CANARY_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
        run: |
          if [[ -n "$APEX_CANARY_EMAIL" && -n "$APEX_CANARY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::run_prompt_matrix=true requires APEX_CANARY_EMAIL and APEX_CANARY_PASSWORD secrets."
            exit 1
          fi

      - name: Set up Node
        if: steps.canary-creds.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E deps
        if: steps.canary-creds.outputs.available == 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.canary-creds.outputs.available == 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run live prompt reliability matrix
        if: steps.canary-creds.outputs.available == 'true'
        env:
          BASE_URL: https://api.apex-build.dev/api/v1
          PROMPT_DIR: prompts/canary
          EXPECTED_PROMPT_COUNT: 20
          POWER_MODES: ${{ inputs.prompt_matrix_power_modes }}
          MODE: full
          POLL_SECONDS: 15
          MAX_POLLS: 220
          PREVIEW_STABILITY_SECONDS: 12
          PREVIEW_STABILITY_POLL_MS: 1000
          PROJECT_NAME_PREFIX: prompt-reliability-live-matrix
          ARTIFACT_ROOT: prompt-matrix-artifacts
          LOGIN_EMAIL: ${{ secrets.APEX_CANARY_EMAIL }}
          LOGIN_USERNAME: ${{ secrets.APEX_CANARY_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.APEX_CANARY_PASSWORD }}
        run: ./scripts/run_live_prompt_matrix.sh

      - name: Upload prompt matrix artifacts
        if: always() && steps.canary-creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-reliability-live-matrix-artifacts
          path: prompt-matrix-artifacts
          retention-days: 14
