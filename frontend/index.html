<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>APEX.BUILD - Cyberpunk Cloud Development Platform</title>
    <meta name="title" content="APEX.BUILD - Cyberpunk Cloud Development Platform" />
    <meta name="description" content="The future of development is here. Build, code, and deploy with multi-AI assistance in a beautiful cyberpunk interface. Real-time collaboration, cloud execution, and intelligent code completion." />
    <meta name="keywords" content="cloud development, AI coding, cyberpunk IDE, real-time collaboration, code editor, cloud computing, development platform" />
    <meta name="author" content="APEX.BUILD Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apex-build.dev/" />
    <meta property="og:title" content="APEX.BUILD - Cyberpunk Cloud Development Platform" />
    <meta property="og:description" content="The future of development is here. Build, code, and deploy with multi-AI assistance in a beautiful cyberpunk interface." />
    <meta property="og:image" content="https://apex-build.dev/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://apex-build.dev/" />
    <meta property="twitter:title" content="APEX.BUILD - Cyberpunk Cloud Development Platform" />
    <meta property="twitter:description" content="The future of development is here. Build, code, and deploy with multi-AI assistance in a beautiful cyberpunk interface." />
    <meta property="twitter:image" content="https://apex-build.dev/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#00f5ff" />
    <meta name="msapplication-TileColor" content="#00f5ff" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="APEX.BUILD" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "APEX.BUILD",
      "description": "Cyberpunk Cloud Development Platform with AI assistance",
      "url": "https://apex-build.dev",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "APEX.BUILD Team"
      }
    }
    </script>

    <link rel="stylesheet" href="/bootstrap.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="white"/>
          </svg>
        </div>
        <div class="loading-text">APEX.BUILD</div>
        <div class="loading-subtitle">Initializing Cyberpunk Development Environment</div>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- App Root -->
    <div id="root"></div>

    <!-- Scripts -->
    <script type="module" src="/src/main.tsx"></script>
    <script src="/bootstrap.js"></script>
  </body>
</html>
