<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>APEX-BUILD - Multi-Agent AI App Builder</title>
    <meta name="title" content="APEX-BUILD - Multi-Agent AI App Builder" />
    <meta name="description" content="Build production-grade apps with 9 specialized AI agents, flagship and open-weight model routing, BYOK controls, live cost tracking, GitHub export, and a full cloud IDE." />
    <meta name="keywords" content="AI app builder, multi-agent coding, AI cloud IDE, BYOK, GitHub export, MCP connectors, enterprise app builder, cloud development platform" />
    <meta name="author" content="APEX-BUILD Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apex-build.dev/" />
    <meta property="og:title" content="APEX-BUILD - Multi-Agent AI App Builder" />
    <meta property="og:description" content="Build production-grade apps with 9 specialized AI agents, BYOK controls, live cost tracking, GitHub export, and a full cloud IDE." />
    <meta property="og:image" content="https://apex-build.dev/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://apex-build.dev/" />
    <meta property="twitter:title" content="APEX-BUILD - Multi-Agent AI App Builder" />
    <meta property="twitter:description" content="Build production-grade apps with 9 specialized AI agents, BYOK controls, live cost tracking, GitHub export, and a full cloud IDE." />
    <meta property="twitter:image" content="https://apex-build.dev/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#00f5ff" />
    <meta name="msapplication-TileColor" content="#00f5ff" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="APEX-BUILD" />

    <!-- Build Cache Bust -->
    <meta name="build-id" content="BUILD_TIMESTAMP_PLACEHOLDER" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "APEX-BUILD",
      "description": "Multi-agent AI app builder for production-grade software",
      "url": "https://apex-build.dev",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "APEX-BUILD Team"
      }
    }
    </script>

    <link rel="stylesheet" href="/bootstrap.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <video
        class="loading-video"
        src="/apex-build-loading.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true"
      ></video>
      <div class="loading-fallback" aria-live="polite">APEX-BUILD loading</div>
    </div>

    <!-- App Root -->
    <div id="root"></div>

    <!-- Scripts -->
    <script type="module" src="/src/main.tsx"></script>
    <script src="/bootstrap.js"></script>
  </body>
</html>
